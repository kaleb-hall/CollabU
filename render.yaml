services:
  - type: web
    name: collabu-api
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn run:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: collabu-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: collabu-db
    plan: free
    databaseName: collabu
