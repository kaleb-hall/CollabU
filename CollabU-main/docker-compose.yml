version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://collabu:collabu@db:5432/collabu
      - SECRET_KEY=dev-secret-change-in-production
      - JWT_SECRET_KEY=jwt-secret-change-in-production
      - CORS_ORIGINS=http://localhost:5173
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=collabu
      - POSTGRES_USER=collabu
      - POSTGRES_PASSWORD=collabu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
